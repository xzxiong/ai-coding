services:
  server:
    image: ${IMAGE_NAME:-ai-coding}:${IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4o}
      - DATA_FILE=/data/usage.db
    volumes:
      - usage-data:/data
    restart: unless-stopped

volumes:
  usage-data:
